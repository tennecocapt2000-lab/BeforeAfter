<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Before/After App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f1f5f9;
            touch-action: manipulation;
        }
        .photo-slot {
            aspect-ratio: 4 / 3;
            background-color: #ffffff;
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .photo-slot.has-image {
            border: 2px solid #e2e8f0;
        }
        .loader-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0f172a;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input, button { font-size: 16px !important; }
        .result-image {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            max-width: 100%;
            height: auto;
            border-radius: 1rem;
        }
    </style>
</head>
<body class="p-4 md:p-10 pb-20">

    <div class="max-w-md mx-auto">
        <header class="text-center mb-8" id="mainHeader">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Before/After App</h1>
            <p class="text-slate-500 text-sm mt-1">เปรียบเทียบงานก่อนและหลังปรับปรุง</p>
        </header>

        <div id="inputSection" class="space-y-6">
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200/50 p-6 space-y-6">
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-slate-700 ml-1">ชื่อพื้นที่ / รายการงาน</label>
                    <input type="text" id="areaName" placeholder="ระบุตำแหน่งพื้นที่..." 
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <!-- Before -->
                    <div class="space-y-2 text-center">
                        <span class="text-[11px] font-bold text-blue-600 uppercase tracking-widest">ก่อนปรับปรุง</span>
                        <div id="beforeBtn" onclick="document.getElementById('inputBefore').click()" 
                            class="photo-slot rounded-3xl flex flex-col items-center justify-center cursor-pointer overflow-hidden relative">
                            <div id="beforePlaceholder" class="flex flex-col items-center p-2 text-slate-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                <span class="text-[10px] font-medium text-center">แตะเพื่อเลือกรูป</span>
                            </div>
                            <img id="beforePreview" class="hidden w-full h-full object-cover">
                        </div>
                        <input type="file" id="inputBefore" accept="image/*" class="hidden" onchange="handleImage(this, 'before')">
                    </div>

                    <!-- After -->
                    <div class="space-y-2 text-center">
                        <span class="text-[11px] font-bold text-green-600 uppercase tracking-widest">หลังปรับปรุง</span>
                        <div id="afterBtn" onclick="document.getElementById('inputAfter').click()" 
                            class="photo-slot rounded-3xl flex flex-col items-center justify-center cursor-pointer overflow-hidden relative">
                            <div id="afterPlaceholder" class="flex flex-col items-center p-2 text-slate-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                <span class="text-[10px] font-medium text-center">แตะเพื่อเลือกรูป</span>
                            </div>
                            <img id="afterPreview" class="hidden w-full h-full object-cover">
                        </div>
                        <input type="file" id="inputAfter" accept="image/*" class="hidden" onchange="handleImage(this, 'after')">
                    </div>
                </div>

                <button id="btnAction" onclick="generateResult()" 
                    class="w-full bg-slate-900 hover:bg-black text-white py-5 rounded-[1.5rem] font-semibold text-lg transition-all active:scale-[0.97] flex items-center justify-center space-x-3 shadow-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    <span>สร้างรูปเปรียบเทียบ</span>
                </button>
            </div>
        </div>

        <div id="resultView" class="hidden mt-10 space-y-6">
            <div class="relative">
                <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-4 py-1 rounded-full text-xs font-bold z-10 shadow-lg">
                    ผลลัพธ์พร้อมใช้งาน
                </div>
                <div class="bg-white rounded-[2.5rem] shadow-2xl p-4 text-center">
                    <div class="mb-4 pt-4 px-4">
                        <p class="text-slate-500 text-xs leading-relaxed italic">
                            แตะค้างที่รูปภาพด้านล่าง แล้วเลือก <span class="font-bold text-slate-800 underline">"บันทึกรูปภาพ"</span> หรือ <span class="font-bold text-slate-800 underline">"แชร์"</span> เพื่อส่งต่อได้ทันที
                        </p>
                    </div>
                    
                    <div class="bg-slate-50 rounded-2xl overflow-hidden mb-6 border border-slate-100">
                        <img id="finalImage" class="result-image mx-auto" alt="ผลลัพธ์">
                    </div>

                    <div class="grid grid-cols-2 gap-3 pb-2">
                        <button onclick="downloadImageManually()" class="flex flex-col items-center justify-center bg-blue-600 text-white p-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-200">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            <span class="text-sm">บันทึกรูป</span>
                        </button>
                        <button onclick="resetApp()" class="flex flex-col items-center justify-center bg-slate-100 text-slate-700 p-4 rounded-2xl font-bold transition-all active:scale-95 border border-slate-200">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                            <span class="text-sm">เริ่มใหม่</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="exportCanvas" class="hidden"></canvas>

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex flex-col items-center justify-center text-white">
        <div class="loader-spinner mb-4"></div>
        <p class="font-medium tracking-wide">กำลังสร้างรูปเปรียบเทียบ...</p>
    </div>

    <script>
        const state = { beforeImg: null, afterImg: null, currentBlob: null };

        function handleImage(input, type) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById(`${type}Preview`);
                const placeholder = document.getElementById(`${type}Placeholder`);
                const slot = document.getElementById(`${type}Btn`);

                preview.src = e.target.result;
                preview.classList.remove('hidden');
                placeholder.classList.add('hidden');
                slot.classList.add('has-image');
                
                const img = new Image();
                img.onload = () => state[`${type}Img`] = img;
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function generateResult() {
            const areaNameInput = document.getElementById('areaName').value.trim();
            const areaName = areaNameInput || "รายงานเปรียบเทียบรูปภาพ";
            
            if (!state.beforeImg || !state.afterImg) {
                alert("กรุณาเลือกรูปภาพให้ครบทั้งสองช่องครับ");
                return;
            }

            toggleLoading(true);

            try {
                const canvas = document.getElementById('exportCanvas');
                const ctx = canvas.getContext('2d');
                
                // HD Layout Settings
                const p = 30, hH = 120, iW = 800, iH = 600;
                canvas.width = (iW * 2) + (p * 3);
                canvas.height = iH + hH + (p * 2);

                // Draw Background
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw Text
                ctx.fillStyle = "#0f172a";
                ctx.font = "bold 52px Kanit, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(areaName, canvas.width / 2, 80);

                function drawFrame(img, x, y, w, h, label, labelBg) {
                    ctx.save();
                    const r = 25;
                    ctx.beginPath();
                    ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
                    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
                    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
                    ctx.closePath(); ctx.clip();

                    const ir = img.width / img.height, tr = w / h;
                    let sw, sh, sx, sy;
                    if (ir > tr) { sh = img.height; sw = img.height * tr; sx = (img.width - sw) / 2; sy = 0; }
                    else { sw = img.width; sh = img.width / tr; sx = 0; sy = (img.height - sh) / 2; }
                    ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
                    ctx.restore();

                    // Label Badge
                    ctx.fillStyle = labelBg;
                    ctx.beginPath(); ctx.roundRect(x + 25, y + 25, 180, 60, 15); ctx.fill();
                    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 28px Kanit, sans-serif";
                    ctx.textAlign = "center"; ctx.fillText(label, x + 115, y + 65);
                }

                drawFrame(state.beforeImg, p, hH + p, iW, iH, "BEFORE", "#2563eb");
                drawFrame(state.afterImg, iW + (p * 2), hH + p, iW, iH, "AFTER", "#16a34a");

                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                const finalImg = document.getElementById('finalImage');
                finalImg.src = dataUrl;
                state.currentBlob = dataUrl;
                
                // Show Result and Scroll
                document.getElementById('resultView').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('resultView').scrollIntoView({ behavior: 'smooth' });
                }, 100);

            } catch (error) {
                console.error(error);
                alert("ระบบขัดข้อง กรุณาลองใหม่อีกครั้ง");
            } finally {
                toggleLoading(false);
            }
        }

        function downloadImageManually() {
            if (!state.currentBlob) return;
            const a = document.createElement('a');
            a.href = state.currentBlob;
            a.download = `Comparison_${Date.now()}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function resetApp() {
            document.getElementById('areaName').value = "";
            ['before', 'after'].forEach(type => {
                document.getElementById(`${type}Preview`).classList.add('hidden');
                document.getElementById(`${type}Placeholder`).classList.remove('hidden');
                document.getElementById(`${type}Btn`).classList.remove('has-image');
                state[`${type}Img`] = null;
            });
            document.getElementById('resultView').classList.add('hidden');
            state.currentBlob = null;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }
    </script>
</body>
</html>
