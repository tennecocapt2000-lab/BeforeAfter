<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เครื่องมือเปรียบเทียบรูปภาพ Before/After</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
            touch-action: manipulation;
        }
        .photo-slot {
            aspect-ratio: 4 / 3;
            background-color: #f1f5f9;
            border: 2px dashed #cbd5e1;
            transition: all 0.2s;
        }
        .photo-slot.has-image {
            border: none;
            background-color: #fff;
        }
        .loader-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        input, button {
            font-size: 16px !important; /* Prevent iOS zoom */
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <!-- Header -->
        <header class="text-center mb-6">
            <h1 class="text-2xl font-semibold text-slate-800">เปรียบเทียบรูปภาพ</h1>
            <p class="text-slate-500 text-sm">สร้างรูป Before & After ง่ายๆ ในไม่กี่วินาที</p>
        </header>

        <!-- Input Section -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-5 space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">พื้นที่ / ชื่อรายการ</label>
                <input type="text" id="areaName" placeholder="เช่น บริเวณคลังสินค้า A" 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- Before Slot -->
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-2 uppercase tracking-wider text-center">รูปก่อนปรับปรุง</label>
                    <div id="beforeBtn" onclick="document.getElementById('inputBefore').click()" 
                        class="photo-slot rounded-2xl flex flex-col items-center justify-center cursor-pointer overflow-hidden relative">
                        <div id="beforePlaceholder" class="flex flex-col items-center p-2 text-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-400 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4" />
                            </svg>
                            <span class="text-xs text-slate-400 font-light">กดเพื่อเพิ่มรูป</span>
                        </div>
                        <img id="beforePreview" class="hidden w-full h-full object-cover">
                        <div id="beforeBadge" class="hidden absolute top-2 left-2 bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full font-medium">BEFORE</div>
                    </div>
                    <input type="file" id="inputBefore" accept="image/*" class="hidden" onchange="handleImage(this, 'before')">
                </div>

                <!-- After Slot -->
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-2 uppercase tracking-wider text-center">รูปหลังปรับปรุง</label>
                    <div id="afterBtn" onclick="document.getElementById('inputAfter').click()" 
                        class="photo-slot rounded-2xl flex flex-col items-center justify-center cursor-pointer overflow-hidden relative">
                        <div id="afterPlaceholder" class="flex flex-col items-center p-2 text-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-400 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4" />
                            </svg>
                            <span class="text-xs text-slate-400 font-light">กดเพื่อเพิ่มรูป</span>
                        </div>
                        <img id="afterPreview" class="hidden w-full h-full object-cover">
                        <div id="afterBadge" class="hidden absolute top-2 right-2 bg-green-600 text-white text-[10px] px-2 py-0.5 rounded-full font-medium">AFTER</div>
                    </div>
                    <input type="file" id="inputAfter" accept="image/*" class="hidden" onchange="handleImage(this, 'after')">
                </div>
            </div>

            <!-- Action Button -->
            <button id="btnAction" onclick="generateAndShare()" 
                class="w-full bg-slate-900 hover:bg-black text-white py-4 rounded-2xl font-medium transition-all active:scale-[0.98] flex items-center justify-center space-x-2 shadow-lg shadow-slate-200">
                <span>บันทึก/แชร์รูปภาพ</span>
            </button>
        </div>

        <p class="text-center text-xs text-slate-400 mt-6 font-light">ออกแบบมาเพื่อการใช้งานที่รวดเร็ว ไม่ต้องลงทะเบียน</p>
    </div>

    <!-- Hidden Canvas for Export -->
    <canvas id="exportCanvas" class="hidden"></canvas>

    <!-- UI Feedback Components -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
        <div class="loader-spinner mb-3"></div>
        <p class="text-slate-800 font-medium">กำลังบันทึก...</p>
    </div>

    <div id="successToast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full shadow-xl z-50 transform translate-y-[-150%] transition-transform duration-300 pointer-events-none">
        <div class="flex items-center space-x-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
            <span class="font-medium">บันทึกสำเร็จ</span>
        </div>
    </div>

    <div id="fallbackModal" class="hidden fixed inset-0 bg-slate-900/50 p-6 z-[60] flex items-center justify-center">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm">
            <h3 class="text-lg font-semibold mb-2">ดาวน์โหลดรูปแล้ว</h3>
            <p class="text-slate-600 text-sm mb-6">ระบบดาวน์โหลดรูปแล้ว หากต้องการเก็บในอัลบั้ม โปรดเปิดไฟล์และกดบันทึกรูปภาพ</p>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-medium">รับทราบ</button>
        </div>
    </div>

    <script>
        const state = {
            beforeImg: null,
            afterImg: null
        };

        function handleImage(input, type) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById(`${type}Preview`);
                const placeholder = document.getElementById(`${type}Placeholder`);
                const badge = document.getElementById(`${type}Badge`);
                const slot = document.getElementById(`${type}Btn`);

                preview.src = e.target.result;
                preview.classList.remove('hidden');
                placeholder.classList.add('hidden');
                badge.classList.remove('hidden');
                slot.classList.add('has-image');
                
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    state[`${type}Img`] = img;
                };
            };
            reader.readAsDataURL(file);
        }

        async function generateAndShare() {
            const areaName = document.getElementById('areaName').value || "ไม่ได้ระบุพื้นที่";
            
            if (!state.beforeImg || !state.afterImg) {
                alertCustom("โปรดใส่รูปภาพให้ครบทั้ง 'ก่อน' และ 'หลัง'");
                return;
            }

            toggleLoading(true);

            try {
                const canvas = document.getElementById('exportCanvas');
                const ctx = canvas.getContext('2d');

                // High Quality Export Setup (2:1 Ratio for Comparison)
                const margin = 40;
                const headerHeight = 120;
                const imgWidth = 1200;
                const imgHeight = 900;
                
                canvas.width = (imgWidth * 2) + (margin * 3);
                canvas.height = imgHeight + headerHeight + (margin * 2);

                // Background
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw Area Name
                ctx.fillStyle = "#1e293b";
                ctx.font = "bold 64px Kanit, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(areaName, canvas.width / 2, 85);

                // Helper to draw images in 'Cover' style
                function drawCoverImage(img, dx, dy, dw, dh) {
                    const imgRatio = img.width / img.height;
                    const targetRatio = dw / dh;
                    let sw, sh, sx, sy;

                    if (imgRatio > targetRatio) {
                        sh = img.height;
                        sw = img.height * targetRatio;
                        sx = (img.width - sw) / 2;
                        sy = 0;
                    } else {
                        sw = img.width;
                        sh = img.width / targetRatio;
                        sx = 0;
                        sy = (img.height - sh) / 2;
                    }

                    // Rounded Corners for images
                    ctx.save();
                    const radius = 30;
                    ctx.beginPath();
                    ctx.moveTo(dx + radius, dy);
                    ctx.lineTo(dx + dw - radius, dy);
                    ctx.quadraticCurveTo(dx + dw, dy, dx + dw, dy + radius);
                    ctx.lineTo(dx + dw, dy + dh - radius);
                    ctx.quadraticCurveTo(dx + dw, dy + dh, dx + dw - radius, dy + dh);
                    ctx.lineTo(dx + radius, dy + dh);
                    ctx.quadraticCurveTo(dx, dy + dh, dx, dy + dh - radius);
                    ctx.lineTo(dx, dy + radius);
                    ctx.quadraticCurveTo(dx, dy, dx + radius, dy);
                    ctx.closePath();
                    ctx.clip();
                    
                    ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
                    ctx.restore();
                }

                // Draw Images
                drawCoverImage(state.beforeImg, margin, headerHeight, imgWidth, imgHeight);
                drawCoverImage(state.afterImg, imgWidth + (margin * 2), headerHeight, imgWidth, imgHeight);

                // Draw Labels on Images
                ctx.font = "bold 40px Kanit, sans-serif";
                
                // Before Label
                ctx.fillStyle = "#2563eb";
                ctx.fillRect(margin + 20, headerHeight + 20, 200, 70);
                ctx.fillStyle = "#FFFFFF";
                ctx.fillText("BEFORE", margin + 120, headerHeight + 68);

                // After Label
                ctx.fillStyle = "#16a34a";
                ctx.fillRect(imgWidth + (margin * 2) + 20, headerHeight + 20, 200, 70);
                ctx.fillStyle = "#FFFFFF";
                ctx.fillText("AFTER", imgWidth + (margin * 2) + 120, headerHeight + 68);

                // Process sharing
                canvas.toBlob(async (blob) => {
                    const fileName = `BeforeAfter_${new Date().getTime()}.jpg`;
                    const file = new File([blob], fileName, { type: "image/jpeg" });

                    if (navigator.share && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: 'ผลการเปรียบเทียบรูปภาพ',
                                text: `ผลงานการปรับปรุงพื้นที่: ${areaName}`
                            });
                            onSuccess();
                        } catch (err) {
                            if (err.name !== 'AbortError') {
                                fallbackDownload(blob, fileName);
                            }
                            toggleLoading(false);
                        }
                    } else {
                        fallbackDownload(blob, fileName);
                    }
                }, 'image/jpeg', 0.85);

            } catch (error) {
                console.error(error);
                toggleLoading(false);
                alertCustom("เกิดข้อผิดพลาดในการประมวลผล");
            }
        }

        function fallbackDownload(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            toggleLoading(false);
            document.getElementById('fallbackModal').classList.remove('hidden');
            onSuccess();
        }

        function toggleLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        function onSuccess() {
            toggleLoading(false);
            showToast();
            
            // Clear all data
            document.getElementById('areaName').value = "";
            document.getElementById('inputBefore').value = "";
            document.getElementById('inputAfter').value = "";
            
            // Reset previews
            ['before', 'after'].forEach(type => {
                document.getElementById(`${type}Preview`).classList.add('hidden');
                document.getElementById(`${type}Placeholder`).classList.remove('hidden');
                document.getElementById(`${type}Badge`).classList.add('hidden');
                document.getElementById(`${type}Btn`).classList.remove('has-image');
                state[`${type}Img`] = null;
            });

            // Smooth Scroll to Top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showToast() {
            const toast = document.getElementById('successToast');
            toast.style.transform = 'translate(-1/2, 0)';
            setTimeout(() => {
                toast.style.transform = 'translate(-1/2, -150%)';
            }, 3000);
        }

        function closeModal() {
            document.getElementById('fallbackModal').classList.add('hidden');
        }

        // Custom Simple Alert instead of native alert()
        function alertCustom(msg) {
            const toast = document.getElementById('successToast');
            const originalContent = toast.innerHTML;
            toast.classList.replace('bg-green-600', 'bg-red-600');
            toast.innerHTML = `<span class="font-medium">${msg}</span>`;
            toast.style.transform = 'translate(-1/2, 0)';
            
            setTimeout(() => {
                toast.style.transform = 'translate(-1/2, -150%)';
                setTimeout(() => {
                    toast.classList.replace('bg-red-600', 'bg-green-600');
                    toast.innerHTML = originalContent;
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
